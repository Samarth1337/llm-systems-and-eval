<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1a1033"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="480" fill="url(#bg)"/>
  <rect width="1200" height="480" fill="url(#grid)"/>

  <!-- Accent bar -->
  <rect x="60" y="60" width="6" height="60" rx="3" fill="url(#accent)"/>

  <!-- Title block -->
  <text x="90" y="92" fill="#e6e9ef" font-size="14" letter-spacing="3">SAMARTH SAXENA · OPEN SOURCE</text>
  <text x="90" y="148" fill="#ffffff" font-size="44" font-weight="700">LLM Systems &amp; Evals</text>
  <text x="90" y="184" fill="#a5adcb" font-size="20">End-to-end pipeline for serving, evaluating, and improving</text>
  <text x="90" y="210" fill="#a5adcb" font-size="20">a locally-hosted open-weights LLM · <tspan fill="#22d3ee">mistral:7b</tspan> on <tspan fill="#22d3ee">Ollama</tspan></text>

  <!-- Pipeline diagram -->
  <g transform="translate(90, 270)">
    <!-- Connecting line -->
    <line x1="60" y1="60" x2="1020" y2="60" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.6"/>

    <!-- Node 1: serve -->
    <g transform="translate(0,0)">
      <circle cx="60" cy="60" r="36" fill="#0b1020" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
      <text x="60" y="66" fill="#ffffff" font-size="22" text-anchor="middle">⚙</text>
      <text x="60" y="124" fill="#e6e9ef" font-size="14" text-anchor="middle" font-weight="600">serve</text>
      <text x="60" y="142" fill="#7d869c" font-size="11" text-anchor="middle">inference + client</text>
    </g>

    <!-- Node 2: eval -->
    <g transform="translate(220,0)">
      <circle cx="60" cy="60" r="36" fill="#0b1020" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
      <text x="60" y="68" fill="#ffffff" font-size="20" text-anchor="middle">📊</text>
      <text x="60" y="124" fill="#e6e9ef" font-size="14" text-anchor="middle" font-weight="600">eval_runner</text>
      <text x="60" y="142" fill="#7d869c" font-size="11" text-anchor="middle">HellaSwag · MMLU · custom</text>
    </g>

    <!-- Node 3: perf -->
    <g transform="translate(440,0)">
      <circle cx="60" cy="60" r="36" fill="#0b1020" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
      <text x="60" y="68" fill="#ffffff" font-size="22" text-anchor="middle">⚡</text>
      <text x="60" y="124" fill="#e6e9ef" font-size="14" text-anchor="middle" font-weight="600">perf</text>
      <text x="60" y="142" fill="#7d869c" font-size="11" text-anchor="middle">TTFT · TPOT · P95</text>
    </g>

    <!-- Node 4: guardrails -->
    <g transform="translate(660,0)">
      <circle cx="60" cy="60" r="36" fill="#0b1020" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
      <text x="60" y="68" fill="#ffffff" font-size="22" text-anchor="middle">🛡</text>
      <text x="60" y="124" fill="#e6e9ef" font-size="14" text-anchor="middle" font-weight="600">guardrails</text>
      <text x="60" y="142" fill="#7d869c" font-size="11" text-anchor="middle">determinism · schema</text>
    </g>

    <!-- Node 5: improve -->
    <g transform="translate(880,0)">
      <circle cx="60" cy="60" r="36" fill="#0b1020" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
      <text x="60" y="68" fill="#ffffff" font-size="22" text-anchor="middle">🧪</text>
      <text x="60" y="124" fill="#e6e9ef" font-size="14" text-anchor="middle" font-weight="600">improve</text>
      <text x="60" y="142" fill="#7d869c" font-size="11" text-anchor="middle">prompt ablations</text>
    </g>
  </g>

  <!-- Footer chip row -->
  <g transform="translate(90, 432)">
    <g>
      <rect x="0" y="0" width="118" height="26" rx="13" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="59" y="17" fill="#e6e9ef" font-size="12" text-anchor="middle">Python · CPU-only</text>
    </g>
    <g transform="translate(130,0)">
      <rect x="0" y="0" width="130" height="26" rx="13" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="65" y="17" fill="#e6e9ef" font-size="12" text-anchor="middle">lm-eval-harness</text>
    </g>
    <g transform="translate(272,0)">
      <rect x="0" y="0" width="118" height="26" rx="13" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="59" y="17" fill="#e6e9ef" font-size="12" text-anchor="middle">8/8 guardrails</text>
    </g>
    <g transform="translate(402,0)">
      <rect x="0" y="0" width="170" height="26" rx="13" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="85" y="17" fill="#e6e9ef" font-size="12" text-anchor="middle">few-shot · +4.0 pts (n=100)</text>
    </g>
  </g>
</svg>
